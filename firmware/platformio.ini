; PlatformIO project for Hive Module
; Target: Waveshare ESP32-S3-Touch-LCD-3.5B

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 16MB flash, 8MB OPI PSRAM (matches board hardware)
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

board_upload.flash_size = 16MB
upload_speed = 921600

; Enable PSRAM
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; GFX Library 1.4.9 — last version compatible with Arduino-ESP32 v2.x
; (v1.5+ requires Arduino-ESP32 v3.x core with esp32-hal-periman.h)
lib_deps =
    moononournation/GFX Library for Arduino@1.4.9

monitor_speed = 115200
